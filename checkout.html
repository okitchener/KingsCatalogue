<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Kings Catalogue</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="main.css">
    <link rel="icon" type="image/png" href="media/crown.png">
</head>

<body class="d-flex flex-column min-vh-100">
    <!-- Header mostly pulled from bootstrap-->
    <header class="mb-0 border-bottom">
        <!-- Mobile header -->
        <div class="d-flex d-md-none align-items-center justify-content-between py-2 px-3">
          <button class="btn p-0 border-0 text-white" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileMenu" aria-controls="mobileMenu" aria-label="Open menu"><i class="bi bi-list fs-2"></i></button>
            <a href="/" class="link-body-emphasis text-decoration-none"><span class="fs-5 text-white text-nowrap">Kings
                    Catalogue</span></a>
            <button type="button" class="btn p-0 border-0 bg-transparent text-white position-relative" aria-label="Open cart"
  data-bs-toggle="offcanvas" data-bs-target="#cartDrawer" aria-controls="cartDrawer">
  <img src="media/treasure_chest.png" alt="Open cart" width="34" height="34">
  <span class="js-cart-count-badge position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none"></span>
</button>
        </div>
        <!-- Desktop header -->
        <div class="d-none d-md-flex flex-wrap align-items-center justify-content-md-between py-3">
            <div class="col-md-3 mb-2 mb-md-0">
                <a href="/" class="d-inline-flex link-body-emphasis text-decoration-none">
                    <img src="media/crown.png" alt="Crown Icon" width="32" height="32" class="me-2">
                    <span class="fs-4 text-white text-nowrap">Kings Catalogue</span>
                </a>
            </div>
            <div class="col-md-6 ps-md-3"><input type="search" class="form-control" placeholder="Search royal wares..."
                    aria-label="Search"></div>
            <div class="col-md-3 text-end">
                <button type="button" class="btn p-0 border-0 bg-transparent text-white position-relative" aria-label="Open cart"
  data-bs-toggle="offcanvas" data-bs-target="#cartDrawer" aria-controls="cartDrawer">
  <img src="media/treasure_chest.png" alt="Open cart" width="34" height="34">
  <span class="js-cart-count-badge position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none"></span>
</button>
                <a href="profile.html" class="btn p-0 border-0 bg-transparent text-white" aria-label="Open profile">
  <i class="bi bi-person-fill"></i>
</a>
            </div>
        </div>
    </header>
    <div class="offcanvas offcanvas-start" tabindex="-1" id="mobileMenu" aria-labelledby="mobileMenuLabel">
      <div class="offcanvas-header">
        <h5 class="offcanvas-title" id="mobileMenuLabel">Menu</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
      </div>
      <div class="offcanvas-body d-flex flex-column gap-2">
        <a href="index.html" class="btn btn-secondary text-start">Home</a>
        <a href="profile.html" class="btn btn-secondary text-start">Profile</a>
        <button type="button" class="btn btn-primary text-start" data-bs-dismiss="offcanvas" data-bs-toggle="offcanvas" data-bs-target="#cartDrawer" aria-controls="cartDrawer">Cart</button>
      </div>
    </div>
    <!-- Mobile search bar -->
    <div class="d-block d-md-none px-3 py-2 border-bottom">
        <input type="search" class="form-control" placeholder="Search royal wares..." aria-label="Search">
    </div>
  <div id="checkoutApp" class="d-flex flex-column flex-grow-1">
   <main class="container-fluid flex-grow-1">
  <div class="row">
    <!-- Left side filter column -->
    <aside class="col-12 col-md-2 pt-3 border-end">
    </aside>
    <section class="col-12 col-md-10 pt-3 pb-4 pb-md-5">
      <checkout-progress :details-verified="detailsVerified"></checkout-progress>
 <div class="row g-4">
    <div class="col-12 col-lg-8">
      <checkout-form
        :details="details"
        :details-verified="detailsVerified"
        @verify-details="verifyDetails"
        @edit-details="editDetails"
        @checkout="checkout"
      ></checkout-form>
    </div>
 <div class="col-12 col-lg-4">
      <div class="border rounded-3 p-3 bg-white">
        <h5 class="mb-3">Order Summary</h5>
        <cart-list
          :cart="cart"
          @increase="increaseQty"
          @decrease="decreaseQty"
          @remove="removeFromCart"
        ></cart-list>
        <cart-summary
          :cart="cart"
          :show-checkout-button="false"
        ></cart-summary>
      </div>
    </div>
  </div>
    </section>

 
  </div>
</main>
    <!--Footer mostly pulled from bootstrap-->
        <footer class="d-flex flex-wrap justify-content-between align-items-center py-2 mt-auto border-top">
          <div class="col-md-4 d-flex align-items-center"> <a href="/"
              class="me-2 text-body-secondary text-decoration-none lh-1" aria-label="Bootstrap"> <svg
                        class="bi" width="30" height="24" aria-hidden="true">
                        <use xlink:href="#bootstrap"></use>
              </svg> </a>  <img src="media/crownBlack.png" alt="Crown Icon" width="32" height="32" class="me-2">
               <span class="mb-0 text-body-secondary">© 2026 Owen Kitchener</span> </div>
          <ul class="nav col-md-4 justify-content-end list-unstyled d-flex mb-0 py-0">
               <li class="ms-3"><a class="text-body-secondary" href="https://www.instagram.com" aria-label="Instagram"><i class="bi bi-instagram fs-5"></i></a></li>
<li class="ms-3"><a class="text-body-secondary" href="https://www.facebook.com" aria-label="Facebook"><i class="bi bi-facebook fs-5"></i></a></li>
<li class="ms-3"><a class="text-body-secondary" href="https://www.twitter.com" aria-label="Twitter"><i class="bi bi-twitter fs-5"></i></a></li>
<li class="ms-3"><a class="text-body-secondary" href="https://www.tiktok.com" aria-label="Tiktok"><i class="bi bi-tiktok fs-5"></i></a></li>
            </ul>
    </footer>
<!-- Cart Drawer mostly pulled from bootstrap -->
    <div class="offcanvas offcanvas-end kc-cart-drawer" tabindex="-1" id="cartDrawer" aria-labelledby="cartDrawerLabel">
  <div class="offcanvas-header">
    <h5 class="offcanvas-title" id="cartDrawerLabel">Your Royal Chest</h5>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
  </div>
  <div class="offcanvas-body d-flex flex-column">
    <cart-list
      :cart="cart"
      @increase="increaseQty"
      @decrease="decreaseQty"
      @remove="removeFromCart"
    ></cart-list>
    <cart-summary
      :cart="cart"
      :show-checkout-button="false"
    ></cart-summary>
  </div>
</div>
        </div>
    <!--<a href="https://www.flaticon.com/free-icons/crown" title="crown icons">Crown icons created by zky.icon - Flaticon</a>-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
        <script type="module" src="./checkout.js"></script>
</body>

</html>
